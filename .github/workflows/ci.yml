name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          echo "Installing dependencies from requirements.txt..."
          pip install -r requirements.txt
          echo "Dependencies installed successfully"

      - name: Check syntax
        run: |
          echo "Checking Python syntax in main.py..."
          python -m py_compile main.py
          echo "Syntax OK"

      - name: Verify templates
        run: |
          echo "Checking templates..."
          for f in templates/base.html templates/index.html templates/converter.html templates/privacy.html templates/terms.html; do
            test -f "$f" && echo "  ✓ $f" || (echo "  ✗ $f MISSING" && exit 1)
          done
          echo "All templates OK"

      - name: Verify static files
        run: |
          echo "Checking static files..."
          for f in static/css/style.css static/icons/pdf.svg static/icons/word.svg static/icons/excel.svg static/icons/ppt.svg; do
            test -f "$f" && echo "  ✓ $f" || (echo "  ✗ $f MISSING" && exit 1)
          done
          echo "All static files OK"

      - name: Done
        run: echo "CI passed successfully"